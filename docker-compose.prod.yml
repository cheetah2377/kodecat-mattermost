# =============================================================================
# Mattermost Team Edition - Production (Dokploy)
# =============================================================================
# Deploy via Dokploy: Git source -> docker-compose.prod.yml
# Uses internal PostgreSQL database with S3 backup sidecar.
#
# Configuration via environment variables (.env.prod):
#   MM_DOMAIN                     - Domain for Traefik routing (chat.kodeme.io)
#   MM_POSTGRESQL_PASSWORD        - PostgreSQL password
#   AUTHENTIK_MATTERMOST_CLIENT_ID - OAuth2 client ID from Authentik
#   AUTHENTIK_MATTERMOST_CLIENT_SECRET - OAuth2 client secret
#
# Deployment:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Verification:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod ps
#   curl -I https://chat.kodeme.io
# =============================================================================

# Logging configuration with rotation
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

volumes:
  mm-postgres-data:
  mm-config:
  mm-data:
  mm-logs:
  mm-plugins:
  mm-client-plugins:
  mm-bleve-indexes:

networks:
  dokploy-network:
    external: true
  mm-internal:
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Database
  # ---------------------------------------------------------------------------
  mm-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    networks:
      mm-internal:
        aliases:
          - mm-postgres
    environment:
      POSTGRES_USER: "${MM_POSTGRESQL_USER:-mmuser}"
      POSTGRES_PASSWORD: "${MM_POSTGRESQL_PASSWORD}"
      POSTGRES_DB: "${MM_POSTGRESQL_NAME:-mattermost}"
    volumes:
      - mm-postgres-data:/var/lib/postgresql/data
    labels:
      - "logging=promtail"
      - "logging.format=postgres"
      - "app=mattermost"
      - "app.tenant=${TENANT:-kodemeio}"
      - "app.component=database"
      - "app.service=mattermost-postgres"
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT_DB:-1}"
          memory: ${MEMORY_LIMIT_DB:-1G}
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MM_POSTGRESQL_USER:-mmuser} -d ${MM_POSTGRESQL_NAME:-mattermost}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Mattermost — Chat Application
  # ---------------------------------------------------------------------------
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    # image: ghcr.io/tgunawandev/kodemeio-mattermost/mattermost:${MM_IMAGE_TAG:-10.5}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    networks:
      - mm-internal
      - dokploy-network
    ports:
      # Mattermost Calls RTC media server (UDP primary, TCP fallback)
      # Port 8466 chosen to avoid conflict with mailcow nginx on 8443
      - "8466:8466/udp"
      - "8466:8466/tcp"
    depends_on:
      mm-postgres:
        condition: service_healthy
    environment:
      TZ: "${TZ:-Asia/Jakarta}"
      # Database
      MM_SQLSETTINGS_DRIVERNAME: "postgres"
      MM_SQLSETTINGS_DATASOURCE: "postgres://${MM_POSTGRESQL_USER:-mmuser}:${MM_POSTGRESQL_PASSWORD}@mm-postgres:5432/${MM_POSTGRESQL_NAME:-mattermost}?sslmode=disable&connect_timeout=10"
      # Site URL
      MM_SERVICESETTINGS_SITEURL: "https://${MM_DOMAIN}"
      MM_SERVICESETTINGS_ENABLEOAUTHSERVICEPROVIDER: "true"
      MM_SERVICESETTINGS_ENABLELOCALMODE: "true"
      # Authentik SSO (GitLab provider)
      MM_GITLABSETTINGS_ENABLE: "true"
      MM_GITLABSETTINGS_ID: "${AUTHENTIK_MATTERMOST_CLIENT_ID}"
      MM_GITLABSETTINGS_SECRET: "${AUTHENTIK_MATTERMOST_CLIENT_SECRET}"
      MM_GITLABSETTINGS_SCOPE: ""
      MM_GITLABSETTINGS_AUTHENDPOINT: "${AUTHENTIK_URL}/application/o/authorize/"
      MM_GITLABSETTINGS_TOKENENDPOINT: "${AUTHENTIK_URL}/application/o/token/"
      MM_GITLABSETTINGS_USERAPIENDPOINT: "${AUTHENTIK_URL}/application/o/userinfo/"
      MM_GITLABSETTINGS_BUTTONTEXT: "Log in with Authentik"
      MM_GITLABSETTINGS_BUTTONCOLOR: "#fd4b2d"
      # Plugins
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "${MM_PLUGINSETTINGS_ENABLEUPLOADS:-true}"
      # File Storage
      MM_FILESETTINGS_MAXFILESIZE: "${MM_FILESETTINGS_MAXFILESIZE:-256000000}"
      MM_FILESETTINGS_DRIVERNAME: "${MM_FILESETTINGS_DRIVERNAME:-amazons3}"
      MM_FILESETTINGS_AMAZONS3ACCESSKEYID: "${MM_FILESETTINGS_AMAZONS3ACCESSKEYID:-}"
      MM_FILESETTINGS_AMAZONS3SECRETACCESSKEY: "${MM_FILESETTINGS_AMAZONS3SECRETACCESSKEY:-}"
      MM_FILESETTINGS_AMAZONS3BUCKET: "${MM_FILESETTINGS_AMAZONS3BUCKET:-}"
      MM_FILESETTINGS_AMAZONS3ENDPOINT: "${MM_FILESETTINGS_AMAZONS3ENDPOINT:-}"
      MM_FILESETTINGS_AMAZONS3SSL: "${MM_FILESETTINGS_AMAZONS3SSL:-true}"
      MM_FILESETTINGS_AMAZONS3SIGNV2: "${MM_FILESETTINGS_AMAZONS3SIGNV2:-false}"
      MM_FILESETTINGS_AMAZONS3REGION: "${MM_FILESETTINGS_AMAZONS3REGION:-}"
      # Push Notifications
      MM_EMAILSETTINGS_SENDPUSHNOTIFICATIONS: "true"
      MM_EMAILSETTINGS_PUSHNOTIFICATIONSERVER: "https://push-test.mattermost.com"
      # Email
      MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS: "${MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS:-false}"
      MM_EMAILSETTINGS_ENABLESMTPAUTH: "${MM_EMAILSETTINGS_ENABLESMTPAUTH:-false}"
      MM_EMAILSETTINGS_SMTPSERVER: "${MM_EMAILSETTINGS_SMTPSERVER:-}"
      MM_EMAILSETTINGS_SMTPPORT: "${MM_EMAILSETTINGS_SMTPPORT:-587}"
      MM_EMAILSETTINGS_SMTPUSERNAME: "${MM_EMAILSETTINGS_SMTPUSERNAME:-}"
      MM_EMAILSETTINGS_SMTPPASSWORD: "${MM_EMAILSETTINGS_SMTPPASSWORD:-}"
      MM_EMAILSETTINGS_CONNECTIONSECURITY: "${MM_EMAILSETTINGS_CONNECTIONSECURITY:-}"
      MM_EMAILSETTINGS_FEEDBACKEMAIL: "${MM_EMAILSETTINGS_FEEDBACKEMAIL:-}"
      MM_EMAILSETTINGS_FEEDBACKNAME: "${MM_EMAILSETTINGS_FEEDBACKNAME:-Mattermost}"
      MM_EMAILSETTINGS_REPLYTOADDRESS: "${MM_EMAILSETTINGS_REPLYTOADDRESS:-}"
      MM_EMAILSETTINGS_ENABLEPREVIEWMODEBANNER: "${MM_EMAILSETTINGS_ENABLEPREVIEWMODEBANNER:-false}"
      MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL: "${MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL:-false}"
      MM_EMAILSETTINGS_ENABLESIGNINWITHEMAIL: "${MM_EMAILSETTINGS_ENABLESIGNINWITHEMAIL:-true}"
      # Server
      MM_SERVICESETTINGS_ENABLEOPENSERVER: "${MM_SERVICESETTINGS_ENABLEOPENSERVER:-false}"
      MM_TEAMSETTINGS_MAXUSERSPERTEAM: "${MM_TEAMSETTINGS_MAXUSERSPERTEAM:-1000}"
    volumes:
      - mm-config:/mattermost/config
      - mm-data:/mattermost/data
      - mm-logs:/mattermost/logs
      - mm-plugins:/mattermost/plugins
      - mm-client-plugins:/mattermost/client/plugins
      - mm-bleve-indexes:/mattermost/bleve-indexes
    labels:
      # Traefik routing is managed by Dokploy (domain config); do not set here.
      # Monitoring labels (Grafana Alloy/Loki)
      - "logging=promtail"
      - "logging.format=json"
      - "app=mattermost"
      - "app.tenant=${TENANT:-kodemeio}"
      - "app.component=web"
      - "app.service=mattermost-web"
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT_MM:-2}"
          memory: ${MEMORY_LIMIT_MM:-2G}
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "/mattermost/bin/mmctl", "--local", "system", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Backup — S3 pg_dump sidecar
  # ---------------------------------------------------------------------------
  mm-backup:
    image: ghcr.io/tgunawandev/kodemeio-mattermost/backup:latest
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    environment:
      - PGHOST=mm-postgres
      - PGPORT=5432
      - PGUSER=${MM_POSTGRESQL_USER:-mmuser}
      - PGPASSWORD=${MM_POSTGRESQL_PASSWORD}
      - PGDATABASE=${MM_POSTGRESQL_NAME:-mattermost}
      - S3_ENDPOINT=${S3_BACKUP_ENDPOINT}
      - S3_ACCESS_KEY=${S3_BACKUP_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_BACKUP_SECRET_KEY}
      - S3_BUCKET=${S3_BACKUP_BUCKET:-hz-kodemeio-mattermost-backup}
      - S3_REGION=${S3_BACKUP_REGION:-nbg1}
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-86400}
      - BACKUP_RETENTION_DAILY=${BACKUP_RETENTION_DAILY:-7}
      - BACKUP_RETENTION_WEEKLY=${BACKUP_RETENTION_WEEKLY:-4}
      - TZ=${TZ:-Asia/Jakarta}
    labels:
      - "logging=promtail"
      - "app=mattermost"
      - "app.tenant=${TENANT:-kodemeio}"
      - "app.component=backup"
      - "app.service=mattermost-backup"
    networks:
      - mm-internal
    depends_on:
      mm-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT_BACKUP:-0.25}"
          memory: ${MEMORY_LIMIT_BACKUP:-128M}
        reservations:
          cpus: "0.1"
          memory: 64M
