name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          if [ -f docker-compose.prod.yml ]; then
            docker compose -f docker-compose.prod.yml --env-file .env.example config --quiet
            echo "docker-compose.prod.yml is valid"
          fi

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
        if: hashFiles('Dockerfile') != ''
        continue-on-error: true

      - name: Validate shell scripts
        run: |
          if command -v shellcheck &>/dev/null || sudo apt-get install -y shellcheck > /dev/null 2>&1; then
            ERRORS=0
            for script in $(find scripts/ -name "*.sh" 2>/dev/null); do
              if shellcheck -S warning "$script"; then
                echo "$script: OK"
              else
                echo "$script: WARNINGS"
              fi
            done
          fi
          # Syntax check
          for script in $(find scripts/ -name "*.sh" 2>/dev/null); do
            bash -n "$script"
            echo "$script syntax OK"
          done

      - name: Check for hardcoded secrets
        run: |
          FOUND=0
          if grep -rE "(password|secret|api_key|token).*=.*['\"][^'\"]{8,}['\"]" \
            --include="*.sh" --include="*.yml" --include="*.yaml" --include="*.py" \
            . 2>/dev/null | \
            grep -v ".env.example" | grep -v ".gitignore" | grep -v "validate.yml" | \
            grep -v "CHANGE_ME" | grep -v "placeholder" | grep -v "example" | \
            grep -v "node_modules" | grep -v ".venv"; then
            echo "WARNING: Potential secrets found in code"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "No hardcoded secrets detected"
          fi

      - name: Validate env example completeness
        run: |
          if [ -f .env.example ]; then
            echo ".env.example exists with $(wc -l < .env.example) lines"
            # Check all referenced env vars have examples
            if [ -f docker-compose.prod.yml ]; then
              MISSING=0
              for var in $(grep -oP '\$\{(\w+)\}' docker-compose.prod.yml | sed 's/[${}]//g' | sort -u); do
                if ! grep -q "^${var}=" .env.example 2>/dev/null && \
                   ! grep -q "^#.*${var}=" .env.example 2>/dev/null; then
                  echo "WARNING: $var referenced in compose but not in .env.example"
                  MISSING=$((MISSING+1))
                fi
              done
              if [ "$MISSING" -eq 0 ]; then
                echo "All compose variables documented in .env.example"
              fi
            fi
          fi
